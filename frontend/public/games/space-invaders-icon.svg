<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Space Invaders">
  <!-- Arcade-screen tile (intentionally dark in both themes) -->
  <rect x="0" y="0" width="64" height="64" rx="13" fill="#04120f"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="12.5" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  <!-- Sentinel invader (phosphor) -->
  <g fill="#e6f7ef">
    <rect x="18" y="8" width="4" height="4"/><rect x="42" y="8" width="4" height="4"/>
    <rect x="10" y="12" width="4" height="4"/><rect x="22" y="12" width="4" height="4"/><rect x="38" y="12" width="4" height="4"/><rect x="50" y="12" width="4" height="4"/>
    <rect x="10" y="16" width="4" height="4"/><rect x="18" y="16" width="28" height="4"/><rect x="50" y="16" width="4" height="4"/>
    <rect x="10" y="20" width="12" height="4"/><rect x="26" y="20" width="12" height="4"/><rect x="42" y="20" width="12" height="4"/>
    <rect x="10" y="24" width="44" height="4"/>
    <rect x="14" y="28" width="36" height="4"/>
    <rect x="18" y="32" width="4" height="4"/><rect x="42" y="32" width="4" height="4"/>
    <rect x="14" y="36" width="4" height="4"/><rect x="46" y="36" width="4" height="4"/>
  </g>
  <!-- Eyes pick up the player color (cohesion) -->
  <g fill="#4ff0c0"><rect x="22" y="20" width="4" height="4"/><rect x="38" y="20" width="4" height="4"/></g>
  <!-- Gold shot rising from the cannon -->
  <rect x="31" y="44" width="2" height="8" fill="#ffd24d"/>
  <!-- Player cannon (teal wedge) -->
  <g fill="#4ff0c0"><rect x="30" y="56" width="4" height="4"/><rect x="26" y="58" width="12" height="2"/></g>
</svg>
