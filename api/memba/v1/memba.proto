syntax = "proto3";

package memba.v1;

option go_package = "github.com/samouraiworld/memba/backend/gen/memba/v1;membav1";

// MultisigService provides multisig wallet management and transaction coordination.
service MultisigService {
  // Auth — Challenge-response authentication (ed25519)
  rpc GetChallenge(GetChallengeRequest) returns (GetChallengeResponse);
  rpc GetToken(GetTokenRequest) returns (GetTokenResponse);

  // Multisig — CRUD
  rpc CreateOrJoinMultisig(CreateOrJoinMultisigRequest) returns (CreateOrJoinMultisigResponse);
  rpc MultisigInfo(MultisigInfoRequest) returns (MultisigInfoResponse);
  rpc Multisigs(MultisigsRequest) returns (MultisigsResponse);

  // Transactions — Propose, sign, complete
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);
  rpc Transactions(TransactionsRequest) returns (TransactionsResponse);
  rpc SignTransaction(SignTransactionRequest) returns (SignTransactionResponse);
  rpc CompleteTransaction(CompleteTransactionRequest) returns (CompleteTransactionResponse);

  // Profile — Read/Write user profile
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

  // Quests — GnoBuilders quest system (85 quests, ranks, badges)
  rpc CompleteQuest(CompleteQuestRequest) returns (CompleteQuestResponse);
  rpc GetUserQuests(GetUserQuestsRequest) returns (GetUserQuestsResponse);
  rpc SyncQuests(SyncQuestsRequest) returns (SyncQuestsResponse);
  rpc GetUserRank(GetUserRankRequest) returns (GetUserRankResponse);
  rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse);
  rpc SubmitQuestClaim(SubmitQuestClaimRequest) returns (SubmitQuestClaimResponse);
  rpc ReviewQuestClaim(ReviewQuestClaimRequest) returns (ReviewQuestClaimResponse);
  rpc ListPendingClaims(ListPendingClaimsRequest) returns (ListPendingClaimsResponse);
  // On-chain attestation (Q-05): backend-signed vouchers a user broadcasts to
  // the memba_quest_attestation_v1 realm. Public read; empty when the backend
  // attestation signer is not configured.
  rpc GetAttestationVouchers(GetAttestationVouchersRequest) returns (GetAttestationVouchersResponse);

  // Teams — Collaborative workspaces for DAO management
  rpc CreateTeam(CreateTeamRequest) returns (CreateTeamResponse);
  rpc GetTeam(GetTeamRequest) returns (GetTeamResponse);
  rpc GetMyTeams(GetMyTeamsRequest) returns (GetMyTeamsResponse);
  rpc JoinTeam(JoinTeamRequest) returns (JoinTeamResponse);
  rpc LeaveTeam(LeaveTeamRequest) returns (LeaveTeamResponse);
  rpc UpdateTeamMemberRole(UpdateTeamMemberRoleRequest) returns (UpdateTeamMemberRoleResponse);

  // Marketplace — Agent favorites and stats
  rpc FavoriteAgent(FavoriteAgentRequest) returns (FavoriteAgentResponse);
  rpc GetFavorites(GetFavoritesRequest) returns (GetFavoritesResponse);
  rpc GetAgentStats(GetAgentStatsRequest) returns (GetAgentStatsResponse);

  // Services — Freelance service listings
  rpc CreateServiceListing(CreateServiceListingRequest) returns (CreateServiceListingResponse);
  rpc GetServiceListings(GetServiceListingsRequest) returns (GetServiceListingsResponse);
  rpc UpdateServiceListing(UpdateServiceListingRequest) returns (UpdateServiceListingResponse);

  // NFT Marketplace — cached state from the on-chain indexer (public reads, no auth)
  rpc GetNFTCollection(GetNFTCollectionRequest) returns (GetNFTCollectionResponse);
  rpc GetNFTActivity(GetNFTActivityRequest) returns (GetNFTActivityResponse);
  rpc GetNFTPortfolio(GetNFTPortfolioRequest) returns (GetNFTPortfolioResponse);
  rpc ListNFTTokens(ListNFTTokensRequest) returns (ListNFTTokensResponse);

  // Home — aggregated dashboard snapshot (public read, server-cached)
  rpc GetHomeSnapshot(GetHomeSnapshotRequest) returns (GetHomeSnapshotResponse);

  // Social feed — cached timelines from the memba_feed_v1 indexer (public
  // reads, no auth). The realm is the source of truth; these serve the
  // indexed projection for low-latency, optimistic-UI reads.
  rpc GetFeedTimeline(GetFeedTimelineRequest) returns (GetFeedTimelineResponse);
  rpc GetUserFeed(GetUserFeedRequest) returns (GetUserFeedResponse);
  rpc GetFeedThread(GetFeedThreadRequest) returns (GetFeedThreadResponse);

  // Block Party — daily on-chain-seeded puzzle game
  rpc GetDailyChallenge(GetDailyChallengeRequest) returns (GetDailyChallengeResponse);
  rpc SubmitScore(SubmitScoreRequest) returns (SubmitScoreResponse);
  rpc GetDailyLeaderboard(GetDailyLeaderboardRequest) returns (GetDailyLeaderboardResponse);
  rpc GetStreak(GetStreakRequest) returns (GetStreakResponse);

  // Replies to the caller's own posts — the "someone replied to you" surface.
  rpc GetReplyNotifications(GetReplyNotificationsRequest) returns (GetReplyNotificationsResponse);
  // Feed-wide live stats for the header/rail (post + author counts).
  rpc GetFeedStats(GetFeedStatsRequest) returns (GetFeedStatsResponse);
  // Server-side rich preview for an external URL — OG/Twitter-card metadata via
  // an SSRF-guarded fetch, with the image proxied through a signed token. Public
  // read, no auth; rate-limited; returns ok=false (never an error) so the UI can
  // fall back to a plain link card. Gated by MEMBA_ENABLE_LINK_PREVIEWS.
  rpc GetLinkPreview(GetLinkPreviewRequest) returns (GetLinkPreviewResponse);
  // Reaction counts for a set of posts (+ which emojis the viewer reacted with).
  // Public read, no auth; aggregated from the feed_reactions projection.
  rpc GetPostReactions(GetPostReactionsRequest) returns (GetPostReactionsResponse);
}

// --- Auth Messages ---

message Challenge {
  bytes nonce = 1;
  string expiration = 2;
  bytes server_signature = 3; // ed25519 signature by server (of protobuf encoding with this field zeroed)
  string bound_pubkey_hash = 4; // SHA256 of the pubkey this challenge is bound to (v6 AUTH-01 fix)
  string chain_id = 5; // v7.1 AUTH-CHAINID-01: chain this challenge is bound to
}

// Token is the auth credential passed with authenticated requests.
// We use string for nonce/signature because browser storage has poor bytes support.
message Token {
  string nonce = 1; // base64-encoded
  string expiration = 2;
  string user_address = 3;
  string server_signature = 4; // base64 ed25519 signature by server
  string chain_id = 5; // v7.1 AUTH-CHAINID-01: chain this token is valid for
}

message TokenRequestInfo {
  string kind = 1;
  Challenge challenge = 2;
  string user_bech32_prefix = 3;
  string user_pubkey_json = 4; // Amino JSON pubkey — optional if user_address is set
  string user_address = 5; // Direct address — used when pubkey unavailable from wallet
  string chain_id = 6; // v7.1 AUTH-CHAINID-01: chain the client is authenticating for
}

message GetChallengeRequest {
  string user_pubkey_json = 1; // Amino JSON pubkey — binds the challenge to this key (v6 AUTH-01 fix)
  string chain_id = 2; // v7.1 AUTH-CHAINID-01: chain to bind the challenge to
}

message GetChallengeResponse {
  Challenge challenge = 1;
}

message GetTokenRequest {
  string info_json = 1; // protojson encoding of TokenRequestInfo
  string user_signature = 2; // ed25519 signature by client of info_json
}

message GetTokenResponse {
  Token auth_token = 1;
}

// --- Multisig Messages ---

message Multisig {
  string created_at = 1;
  string chain_id = 2;
  string address = 3;
  bool joined = 4;
  string name = 5;
  string pubkey_json = 6;
  repeated string users_addresses = 7;
  uint32 threshold = 8;
  uint32 members_count = 9;
}

message CreateOrJoinMultisigRequest {
  string chain_id = 1;
  string multisig_pubkey_json = 2;
  Token auth_token = 3;
  string name = 4;
  string bech32_prefix = 5;
}

message CreateOrJoinMultisigResponse {
  bool created = 1;
  bool joined = 2;
  string multisig_address = 3;
}

message MultisigInfoRequest {
  Token auth_token = 1;
  string multisig_address = 2;
  string chain_id = 3;
}

message MultisigInfoResponse {
  Multisig multisig = 1;
}

enum JoinState {
  JOIN_STATE_UNSPECIFIED = 0;
  JOIN_STATE_IN = 1;
  JOIN_STATE_OUT = 2;
}

message MultisigsRequest {
  Token auth_token = 1;
  uint32 limit = 2;
  string start_after = 3;
  string chain_id = 4;
  JoinState join_state = 5;
}

message MultisigsResponse {
  repeated Multisig multisigs = 1;
}

// --- Transaction Messages ---

message Signature {
  string value = 1;
  string user_address = 2;
  bytes body_bytes = 3;
  string created_at = 4;
  // verified: the backend's server-side signature check (A3) passed for this
  // signature at submission time. Recorded in both log-only and enforce modes;
  // false = stored but not cryptographically verified — including all rows
  // submitted before this field existed.
  bool verified = 5;
}

enum ExecutionState {
  EXECUTION_STATE_UNSPECIFIED = 0;
  EXECUTION_STATE_PENDING = 1;
  EXECUTION_STATE_EXECUTED = 2;
}

message Transaction {
  uint32 id = 1;
  string created_at = 2;
  string final_hash = 3;
  string multisig_address = 4;
  string chain_id = 5;
  string msgs_json = 6;
  string fee_json = 7;
  uint32 account_number = 8;
  uint32 sequence = 9;
  string creator_address = 10;
  uint32 threshold = 11;
  uint32 members_count = 12;
  string memo = 13;
  repeated Signature signatures = 14;
  string multisig_pubkey_json = 15;
  string type = 16;
  // verified: the backend confirmed final_hash exists on-chain at completion
  // time (best-effort). false = client-claimed, unconfirmed (W2.3 / BE-3).
  bool verified = 17;
}

message CreateTransactionRequest {
  Token auth_token = 1;
  string multisig_address = 2;
  uint32 account_number = 3;
  uint32 sequence = 4;
  string msgs_json = 5;
  string fee_json = 6;
  string chain_id = 7;
  string memo = 8;
  string type = 9;
}

message CreateTransactionResponse {
  uint32 transaction_id = 1;
}

message TransactionsRequest {
  Token auth_token = 1;
  uint32 limit = 2;
  string start_after = 3;
  string multisig_address = 4;
  string chain_id = 5;
  ExecutionState execution_state = 6;
}

message TransactionsResponse {
  repeated Transaction transactions = 1;
}

message GetTransactionRequest {
  Token auth_token = 1;
  uint32 transaction_id = 2;
}

message GetTransactionResponse {
  Transaction transaction = 1;
}

message SignTransactionRequest {
  Token auth_token = 1;
  string signature = 2;
  uint32 transaction_id = 3;
  bytes body_bytes = 4;
}

message SignTransactionResponse {}

message CompleteTransactionRequest {
  Token auth_token = 1;
  uint32 transaction_id = 2;
  string final_hash = 3;
}

message CompleteTransactionResponse {}

// --- Profile Messages ---

message Profile {
  string address = 1;
  string bio = 2;
  string company = 3;
  string title = 4;
  string avatar_url = 5;
  string twitter = 6;
  string github = 7;
  string website = 8;
  string updated_at = 9;
}

message GetProfileRequest {
  string address = 1; // no auth required — public read
}

message GetProfileResponse {
  Profile profile = 1;
}

message UpdateProfileRequest {
  Token auth_token = 1; // must match profile.address
  Profile profile = 2;
}

message UpdateProfileResponse {
  Profile profile = 1;
}

// --- Quest Messages ---

message QuestCompletion {
  string quest_id = 1;
  string completed_at = 2; // RFC3339
}

message UserQuestState {
  repeated QuestCompletion completed = 1;
  uint32 total_xp = 2;
  // verified_xp counts only proof-backed completions: on_chain quests
  // (server re-verified at grant time) and self_report quests with an
  // admin-approved claim. off_chain/social/legacy XP is excluded — the
  // candidature gate (350 XP) reads this, not total_xp (BE-4).
  uint32 verified_xp = 3;
}

message CompleteQuestRequest {
  Token auth_token = 1;
  string quest_id = 2;
  // proof is an optional realm/package path for deploy quests, verified
  // server-side against the user's registered @username namespace.
  string proof = 3;
}

message CompleteQuestResponse {
  UserQuestState state = 1;
}

message GetUserQuestsRequest {
  string address = 1; // no auth required — public read
}

message GetUserQuestsResponse {
  UserQuestState state = 1;
  // Self-report claim statuses for this address, so the user can see a
  // pending/rejected claim (and resubmit after rejection). Status only — proof
  // contents stay off this public, unauthenticated endpoint.
  repeated QuestClaimStatus claim_statuses = 2;
}

// QuestClaimStatus is the public-safe view of a quest_claims row: the claim's
// lifecycle state without the submitted proof.
message QuestClaimStatus {
  string quest_id = 1;
  string status = 2; // "pending", "approved", "rejected"
  string created_at = 3; // submission time (SQLite DATETIME string)
  string reviewed_at = 4; // review time; empty while pending
}

// AttestationVoucher is a backend-signed voucher the user broadcasts to the
// memba_quest_attestation_v1 realm: RecordCompletion(address, quest_id, xp,
// nonce, sig_hex). The signature is over canonical "address|quest_id|xp|nonce".
message AttestationVoucher {
  string quest_id = 1;
  uint32 xp = 2;
  string nonce = 3;
  string sig_hex = 4; // hex ed25519 signature
}

message GetAttestationVouchersRequest {
  string address = 1; // no auth required — public read
}

message GetAttestationVouchersResponse {
  repeated AttestationVoucher vouchers = 1;
  // realm_path + signer_pubkey_hex are echoed so the client can build/verify the
  // broadcast call without hardcoding them. Empty when attestation is disabled.
  string realm_path = 2;
  string signer_pubkey_hex = 3;
}

// SyncQuests allows the frontend to upload localStorage quests on first backend connection.
// The server validates each quest_id and ignores duplicates. completed_at is preserved from client.
message SyncQuestsRequest {
  Token auth_token = 1;
  repeated QuestCompletion completions = 2;
}

message SyncQuestsResponse {
  UserQuestState state = 1;
}

// --- GnoBuilders Rank & Leaderboard Messages ---

message RankInfo {
  uint32 tier = 1;
  string name = 2;
  uint32 total_xp = 3;
  uint32 quests_completed = 4;
  uint32 next_rank_xp = 5;
}

message GetUserRankRequest {
  string address = 1; // no auth required — public read
}

message GetUserRankResponse {
  RankInfo rank = 1;
}

message LeaderboardEntry {
  string address = 1;
  string username = 2;
  uint32 rank_tier = 3;
  string rank_name = 4;
  uint32 total_xp = 5;
  uint32 quests_completed = 6;
  string avatar_url = 7;
}

message GetLeaderboardRequest {
  uint32 limit = 1; // max entries to return (default 50, max 100)
  uint32 offset = 2; // pagination offset
}

message GetLeaderboardResponse {
  repeated LeaderboardEntry entries = 1;
  uint32 total_count = 2;
}

// --- Quest Claim Messages (self-report verification) ---

message SubmitQuestClaimRequest {
  Token auth_token = 1;
  string quest_id = 2;
  string proof_url = 3; // screenshot, link, or repo URL
  string proof_text = 4; // description of what was done
}

message SubmitQuestClaimResponse {
  string status = 1; // "pending"
}

// --- Admin: Quest Claim Review Messages ---

message ReviewQuestClaimRequest {
  Token auth_token = 1;
  int64 claim_id = 2;
  bool approved = 3;
}

message ReviewQuestClaimResponse {
  string status = 1; // "approved" or "rejected"
}

message QuestClaim {
  int64 id = 1;
  string address = 2;
  string quest_id = 3;
  string proof_url = 4;
  string proof_text = 5;
  string status = 6; // "pending", "approved", "rejected"
  string created_at = 7; // RFC3339
}

message ListPendingClaimsRequest {
  Token auth_token = 1;
}

message ListPendingClaimsResponse {
  repeated QuestClaim claims = 1;
}

// --- Team Messages ---

enum TeamRole {
  TEAM_ROLE_UNSPECIFIED = 0;
  TEAM_ROLE_MEMBER = 1;
  TEAM_ROLE_ADMIN = 2;
}

message Team {
  string id = 1; // UUID
  string name = 2;
  string invite_code = 3; // 8-char alphanumeric, unique
  string created_by = 4; // creator address
  string created_at = 5; // RFC3339
  repeated TeamMember members = 6;
  string description = 7; // optional, max 500 chars
}

message TeamMember {
  string address = 1;
  TeamRole role = 2;
  string joined_at = 3; // RFC3339
}

message CreateTeamRequest {
  Token auth_token = 1;
  string name = 2; // 1-64 chars
  string description = 3; // optional, max 500 chars
}

message CreateTeamResponse {
  Team team = 1;
}

message GetTeamRequest {
  Token auth_token = 1;
  string team_id = 2;
}

message GetTeamResponse {
  Team team = 1;
}

message GetMyTeamsRequest {
  Token auth_token = 1;
}

message GetMyTeamsResponse {
  repeated Team teams = 1;
}

message JoinTeamRequest {
  Token auth_token = 1;
  string invite_code = 2;
}

message JoinTeamResponse {
  Team team = 1;
}

message LeaveTeamRequest {
  Token auth_token = 1;
  string team_id = 2;
}

message LeaveTeamResponse {}

message UpdateTeamMemberRoleRequest {
  Token auth_token = 1;
  string team_id = 2;
  string member_address = 3;
  TeamRole role = 4;
}

message UpdateTeamMemberRoleResponse {
  Team team = 1;
}

// --- Marketplace Messages ---

message FavoriteAgentRequest {
  Token auth_token = 1;
  string agent_id = 2; // on-chain agent ID
}

message FavoriteAgentResponse {
  bool favorited = 1; // true = added, false = removed (toggle)
}

message GetFavoritesRequest {
  Token auth_token = 1;
}

message GetFavoritesResponse {
  repeated string agent_ids = 1;
}

message AgentStats {
  string agent_id = 1;
  uint32 view_count = 2;
  uint32 favorite_count = 3;
}

message GetAgentStatsRequest {
  string agent_id = 1; // no auth required — public read
}

message GetAgentStatsResponse {
  AgentStats stats = 1;
}

// --- Service Listing Messages ---

message ServiceListing {
  string id = 1; // UUID
  string address = 2; // freelancer g1... address
  string title = 3; // 1-200 chars
  string description = 4; // up to 2000 chars
  string category = 5; // development, design, writing, consulting, marketing, other
  uint64 price = 6; // suggested price in ugnot
  uint32 delivery_days = 7;
  string tags = 8; // comma-separated
  bool active = 9;
  string created_at = 10;
  string updated_at = 11;
}

message CreateServiceListingRequest {
  Token auth_token = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  uint64 price = 5; // ugnot
  uint32 delivery_days = 6;
  string tags = 7; // comma-separated
}

message CreateServiceListingResponse {
  ServiceListing listing = 1;
}

message GetServiceListingsRequest {
  string category = 1; // optional filter, empty = all
  uint32 limit = 2; // default 50
  string start_after = 3; // cursor-based pagination
}

message GetServiceListingsResponse {
  repeated ServiceListing listings = 1;
}

message UpdateServiceListingRequest {
  Token auth_token = 1;
  string listing_id = 2;
  string title = 3; // empty = no change
  string description = 4;
  string category = 5;
  uint64 price = 6; // 0 = no change
  uint32 delivery_days = 7; // 0 = no change
  string tags = 8;
  bool active = 9; // toggle active/paused
}

message UpdateServiceListingResponse {
  ServiceListing listing = 1;
}

// --- NFT Marketplace Messages ---

// NFTToken is a single token's cached state.
message NFTToken {
  string collection_id = 1;
  string token_id = 2;
  string owner = 3;
  string uri = 4;
  bool listed = 5;
  uint64 price_ugnot = 6; // 0 when not listed / unknown
}

// NFTActivity is a single cached marketplace event (currently sales).
message NFTActivity {
  uint64 sale_no = 1;
  string token_id = 2;
  string kind = 3; // e.g. "sale"
  uint64 price_ugnot = 4;
  string seller = 5; // may be empty/truncated (Render limitation)
  string buyer = 6; // may be empty/truncated (Render limitation)
  string created_at = 7; // RFC3339
}

message GetNFTCollectionRequest {
  string collection_id = 1; // no auth required — public read
}

message GetNFTCollectionResponse {
  string name = 1;
  string symbol = 2;
  uint64 supply = 3;
  uint64 floor_price_ugnot = 4; // 0 = unknown (e.g. market home route unreachable)
  uint64 total_volume_ugnot = 5;
  uint64 total_sales = 6;
  uint64 active_listings = 7;
  uint64 royalty_bps = 8;
}

message GetNFTActivityRequest {
  string collection_id = 1; // no auth required — public read
  uint32 limit = 2; // default 50, max 500 — event tables hold full history
}

message GetNFTActivityResponse {
  repeated NFTActivity items = 1;
}

message GetNFTPortfolioRequest {
  string owner = 1; // g1... address; no auth required — public read
}

message GetNFTPortfolioResponse {
  repeated NFTToken tokens = 1;
}

message ListNFTTokensRequest {
  string collection_id = 1; // no auth required — public read
  bool listed_only = 2; // when true, only return listed tokens
}

message ListNFTTokensResponse {
  repeated NFTToken tokens = 1;
}

// --- Home Snapshot Messages ---

// NetworkPulse is the chain liveness summary.
message NetworkPulse {
  int64 block_height = 1; // 0 = unknown
  int64 avg_block_time_ms = 2; // 0 = unknown / not computed in v1
  uint32 validators_total = 3;
}

// EcosystemCounts are the per-feature live counts that feed the Ecosystem tiles.
// NOTE: `daos` is intentionally absent — it is sourced client-side from the
// gnoweb namespace (same class as gnolove), not from the on-chain stampede.
message EcosystemCounts {
  uint32 tokens = 1; // 0 = unknown / source failed
  uint32 collections = 2;
  uint32 agents = 3;
  uint32 validators = 4;
}

// FeaturedDao is the configured headline DAO's summary state.
message FeaturedDao {
  string realm_path = 1;
  string name = 2;
  uint32 members = 3;
  uint64 treasury_ugnot = 4; // 0 = unknown (best-effort bank query)
  uint32 open_proposals = 5;
  string latest_proposal_title = 6;
}

// ValidatorsHealth is the cheap network-health subset (no per-validator signatures).
message ValidatorsHealth {
  string status = 1; // "healthy" | "degraded" | "down"
  uint32 active = 2;
  uint32 total = 3;
}

// DirectoryMember is one on-chain users-registry entry (preview).
message DirectoryMember {
  string name = 1;
  string address = 2;
  string avatar_url = 3;
}

// HomeSnapshot is the assembled global home payload. Every field tolerates its
// source failing (zero/empty + listed in stale_sources); the call never fails wholesale.
message HomeSnapshot {
  NetworkPulse network = 1;
  EcosystemCounts counts = 2;
  FeaturedDao featured_dao = 3;
  ValidatorsHealth validators_health = 4;
  repeated DirectoryMember directory_members = 5;
  int64 as_of_block = 6;
  int64 indexer_last_block = 7; // max(last_processed_block) across indexed realms
  string generated_at = 8; // RFC3339
  repeated string stale_sources = 9; // names of sources that failed this assembly
}

message GetHomeSnapshotRequest {
  string chain_id = 1; // no auth required — public read
}

message GetHomeSnapshotResponse {
  HomeSnapshot snapshot = 1;
}

// --- Social Feed Messages ---

// FeedPost is one post's indexed projection (from the memba_feed_v1 realm).
// Hidden/deleted posts are omitted from timeline reads; a thread read may
// include a deleted PARENT as a tombstone so replies keep their context.
message FeedPost {
  reserved 5; // repost_of — added in P1 with the PostReposted handler
  reserved "repost_of";
  uint64 id = 1; // realm post id (monotonic)
  string author = 2; // g1... address
  string body = 3; // empty when deleted
  uint64 reply_to = 4; // 0 = top-level
  int64 block_h = 6; // block height the post was created at
  int64 edited_at = 7; // block height of last edit, 0 = never
  uint32 flag_count = 8;
  bool hidden = 9;
  bool deleted = 10;
  uint32 reply_count = 11; // live replies indexed under this post
  int64 block_ts = 12; // block header time (unix seconds); 0 = unknown. The
  // DETERMINISTIC display timestamp — NOT the indexer's
  // ingest wall-clock (which re-stamps on rebuild-from-raw).
}

message GetFeedTimelineRequest {
  uint64 cursor = 1; // return posts strictly older than this id; 0 = newest
  uint32 limit = 2; // default 20, max 100
}

message GetFeedTimelineResponse {
  repeated FeedPost posts = 1;
  uint64 next_cursor = 2; // pass as cursor for the next page; 0 = end
  int64 indexer_last_block = 3; // feed indexer cursor (staleness signal)
}

message GetUserFeedRequest {
  string author = 1; // g1... address
  uint64 cursor = 2;
  uint32 limit = 3;
}

message GetUserFeedResponse {
  repeated FeedPost posts = 1;
  uint64 next_cursor = 2;
}

message GetFeedThreadRequest {
  uint64 post_id = 1; // the root/parent post
  uint64 cursor = 2; // replies strictly after this id; 0 = from the start
  uint32 limit = 3;
}

message GetFeedThreadResponse {
  FeedPost root = 1; // the parent (may be a deleted tombstone)
  repeated FeedPost replies = 2; // oldest-first (conversation order)
  uint64 next_cursor = 3;
}

// --- Block Party Messages ---

message GetDailyChallengeRequest {
  string date = 1;
} // "" = today (server resolves UTC)
message GetDailyChallengeResponse {
  string date = 1;
  uint32 seed = 2;
  int64 block_height = 3;
  string block_hash = 4;
  string modifier = 5;
  int64 par = 6;
  bool ready = 7; // false when the day's block isn't mined yet
  int32 move_budget = 8;
}

message SubmitScoreRequest {
  Token auth_token = 1; // reuse existing Token message
  string date = 2;
  string move_log = 3; // compact moves, e.g. "URDL..."
}
message SubmitScoreResponse {
  int64 score = 1; // authoritative = server replay
  int32 percentile = 2; // % of today's field beaten
  int64 par = 3;
  BlockPartyStreak streak = 4;
}

message BlockPartyStreak {
  int32 current = 1;
  int32 longest = 2;
  int32 freezes_remaining = 3;
}

message GetDailyLeaderboardRequest {
  string date = 1;
  int32 limit = 2;
}
message LeaderboardScore {
  string address = 1;
  int64 score = 2;
  int32 rank = 3;
}
message GetDailyLeaderboardResponse {
  repeated LeaderboardScore entries = 1;
}

message GetStreakRequest {
  string address = 1;
}
message GetStreakResponse {
  BlockPartyStreak streak = 1;
}

message GetReplyNotificationsRequest {
  string author = 1; // the caller — whose posts' replies we want
  uint64 since_id = 2; // unread = replies with id > this (the client's last-seen)
  uint32 limit = 3; // default 20, max 100
}

message GetReplyNotificationsResponse {
  // Live replies to the author's posts, by other people, newest-first.
  repeated FeedPost replies = 1;
  uint32 unread_count = 2; // how many replies have id > since_id
  uint64 latest_id = 3; // newest reply id (0 = none) — advance the cursor to this
}

message GetFeedStatsRequest {}

message GetFeedStatsResponse {
  uint64 live_posts = 1; // visible top-level posts
  uint64 total_replies = 2; // visible replies
  uint64 total_authors = 3; // distinct authors of visible posts
  // Most-replied visible top-level posts, reply-count-descending (trending).
  repeated FeedPost most_replied = 4;
}

message GetLinkPreviewRequest {
  string url = 1;
}

message GetLinkPreviewResponse {
  bool ok = 1; // false → render the plain link card (unknown / blocked / disabled)
  string title = 2;
  string description = 3;
  string site_name = 4;
  string canonical_url = 5; // resolved/canonical URL (post-redirect)
  string image_token = 6; // opaque signed token for GET /api/link-image; "" if none
  int32 image_width = 7; // og:image:width if present (aspect ratio; 0 = unknown)
  int32 image_height = 8; // og:image:height if present (0 = unknown)
}

message GetPostReactionsRequest {
  repeated uint64 post_ids = 1;
  string viewer = 2; // optional; marks which emojis this wallet reacted with
}

message EmojiCount {
  string emoji = 1;
  uint64 count = 2;
  bool viewer_reacted = 3; // true when the request's viewer reacted with this emoji
}

message PostReactions {
  uint64 post_id = 1;
  repeated EmojiCount reactions = 2; // count-descending
}

message GetPostReactionsResponse {
  repeated PostReactions posts = 1;
}
