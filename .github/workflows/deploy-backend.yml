name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  ci-backend:
    name: Backend CI Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0 && govulncheck ./...

      # Mirrors ci.yml — the deploy path previously skipped golangci-lint, so a
      # lint failure could ship via a direct push to main. Keep byte-identical
      # with ci.yml's Lint step, including the pinned version: a new v2.x
      # release changing default linters/exclusions must not redden the gates
      # with no code change.
      - name: Lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 && golangci-lint run ./...

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [ci-backend]
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      # W3.1 (INF-1): SHA-pinned — @master on the DEPLOY path meant any
      # upstream push could alter the release pipeline unreviewed. Tag: v1.4.
      - uses: superfly/flyctl-actions/setup-flyctl@dfdfedc86b296f5e5384f755a18bf400409a15d0

      - name: Compute release tag
        id: tag
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Deploy
        run: flyctl deploy --remote-only --build-arg APP_VERSION=${{ steps.tag.outputs.version }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # GHCR image mirror — authoritative rollback source when Fly registry expires.
      # See docs/OPS_RUNBOOK.md §rollback.
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror Fly image to GHCR
        # Belt-and-braces rollback insurance. If this step fails (transient
        # registry hiccup, jq schema drift, etc.), the deploy is already
        # successful — don't fail the workflow on mirror issues.
        continue-on-error: true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -uo pipefail
          # `flyctl image show --json` returns an array of image records
          # with fields: Registry, Repository, Tag, Digest, MachineID, etc.
          # No direct "Ref" or "Image" field — we assemble it ourselves.
          # Single-object shape (older flyctl) is handled by the type check.
          FLY_RAW=$(flyctl image show -a memba-backend --json 2>/dev/null || echo '[]')
          FLY_IMAGE=$(printf '%s' "$FLY_RAW" | jq -r '
            if type == "array" then .[0] else . end
            | if (.Registry and .Repository and .Tag)
              then "\(.Registry)/\(.Repository):\(.Tag)"
              else (.Ref // .Image // empty)
              end
          ')
          if [ -z "${FLY_IMAGE:-}" ] || [ "$FLY_IMAGE" = "null" ]; then
            echo "::warning::Could not resolve Fly image ref; skipping GHCR mirror"
            echo "Raw flyctl output (first 500 chars): ${FLY_RAW:0:500}"
            exit 0
          fi
          echo "Mirroring $FLY_IMAGE → ghcr.io"
          docker login registry.fly.io -u x -p "$FLY_API_TOKEN"
          docker pull "$FLY_IMAGE"
          OWNER_LC=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          GHCR_REF="ghcr.io/${OWNER_LC}/memba-backend:${VERSION}"
          docker tag "$FLY_IMAGE" "$GHCR_REF"
          docker push "$GHCR_REF"
          echo "Mirrored to $GHCR_REF"
