name: CI

on:
  pull_request:
    branches: [main, dev/v2]
  push:
    branches: [main, dev/v2]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Backend coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 20" | bc -l) )); then
            echo "::error::Backend coverage ${COVERAGE}% is below 20% threshold"
            exit 1
          fi
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "::warning::Backend coverage ${COVERAGE}% is below 50% target — improve gradually"
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 14

      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest && golangci-lint run ./...

  frontend:
    name: Frontend (React · Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22']
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm test -- --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-node${{ matrix.node-version }}
          path: frontend/coverage/
          retention-days: 14

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(find dist/assets -name '*.js' ! -name '*.map' -exec wc -c {} + | tail -1 | awk '{print $1}')
          MAIN_SIZE_KB=$((MAIN_SIZE / 1024))
          echo "Total JS bundle: ${MAIN_SIZE_KB}KB"
          # Fail if total JS exceeds 600KB (uncompressed)
          if [ "$MAIN_SIZE_KB" -gt 600 ]; then
            echo "::error::Bundle size ${MAIN_SIZE_KB}KB exceeds 600KB budget"
            exit 1
          fi

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npx playwright test --project=chromium --reporter=list

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-node${{ matrix.node-version }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=lighthouserc.json || echo "::warning::Lighthouse budget exceeded — check artifacts"

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-node${{ matrix.node-version }}
          path: frontend/.lighthouseci/
          retention-days: 14

  proto:
    name: Proto (Buf)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          breaking: true
          breaking_against: 'https://github.com/samouraiworld/memba.git#branch=main'

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t memba-backend backend/
      - name: Build frontend image
        run: docker build -t memba-frontend frontend/
