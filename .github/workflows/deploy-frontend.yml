name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  ci-frontend:
    name: Frontend CI Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # Mirrors ci.yml's A9/E8 safety gate — the deploy path previously skipped
      # it, so a fund-unsafe feature flag could ship via a direct push to main
      # (deploy-frontend and ci run independently). Keep in sync with ci.yml;
      # longer-term this duplication should collapse into a reusable workflow
      # (see PR notes).
      - name: "Safety gate: AAA feature flags (A9/E8)"
        working-directory: .
        run: |
          FAIL=0
          for FLAG in VITE_ENABLE_NFT VITE_ENABLE_SERVICES VITE_ENABLE_TREASURY_SPEND VITE_ENABLE_AGENT_CREDITS; do
            VALUE=$(grep "^${FLAG}=" .env.example | cut -d= -f2 || true)
            if [ "$VALUE" = "true" ]; then
              echo "::error::SAFETY GATE FAILED — ${FLAG}=true in .env.example. This flag gates a feature with incomplete on-chain enforcement."
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then exit 1; fi
          echo "✅ All safety-gated feature flags are disabled in .env.example"

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          MAIN_CHUNK=$(find dist/assets -name 'index-*.js' ! -name '*.map' -exec wc -c {} + | tail -1 | awk '{print $1}')
          MAIN_KB=$((MAIN_CHUNK / 1024))
          echo "Main chunk: ${MAIN_KB}KB"
          if [ "$MAIN_KB" -gt 600 ]; then
            echo "::error::Main chunk ${MAIN_KB}KB exceeds 600KB budget"
            exit 1
          fi

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  deploy:
    name: Deploy to Netlify
    # DISABLED 2026-06-25: production deploys via Netlify's NATIVE Git integration
    # (netlify.toml → `npm run build`, publish frontend/dist), which applies the
    # SPA fallback, CSP/security headers, and the Clerk auth proxy. This Action runs
    # nwtgck/actions-netlify from working-directory: frontend, so it does NOT apply
    # netlify.toml — publishing through it serves the app with no route fallback
    # (every deep link 404s) and no security headers. Hard-disabled so it can never
    # publish a broken production build. (The ci-frontend gate above still runs.)
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: [ci-frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # test13 cutover: VITE_GNO_CHAIN_ID is the NETWORK KEY ("test13"); its
          # on-wire chainId ("test-13") + RPC resolve from NETWORKS["test13"] in
          # lib/config.ts. (VITE_GNO_RPC_URL is currently unused by src/ — the
          # active RPC comes from the resolved network; kept in sync for clarity.)
          VITE_GNO_CHAIN_ID: test13
          VITE_GNO_RPC_URL: https://rpc.testnet13.samourai.live:443
          VITE_DAO_REALM_PATH: gno.land/r/samcrew/memba_dao
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_GNOLOVE_API_URL: https://backend.gnolove.world
          VITE_GNO_MONITORING_API_URL: https://monitoring.gnolove.world
          # Sentry release + source-map upload (Phase 0a CR2-07 fix).
          # If this env is empty the @sentry/vite-plugin no-ops gracefully
          # (see frontend/vite.config.ts conditional). If it's set, the
          # plugin uploads maps to Sentry and deletes them from dist via
          # `filesToDeleteAfterUpload`. Build success with token set =
          # successful upload (the plugin throws on upload errors).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Sanity-log the upload intent so a missing/expired secret is
      # noticed early. We deliberately do not assert on local *.map
      # files: the Sentry plugin cleans them up after upload (privacy
      # hardening — maps must not ship to Netlify). Verify uploads via
      # Sentry UI: https://sentry.samourai.pro → memba → Releases.
      # TODO(v7.2): replace this with a Sentry API check that the release
      # has artifacts attached.
      - name: Sentry release intent
        run: |
          set -u
          if [ -z "${SENTRY_TOKEN_SET:-}" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN was empty — Sentry release for this build has no source maps. Verify the secret in repo settings."
          else
            echo "SENTRY_AUTH_TOKEN was set — @sentry/vite-plugin should have uploaded maps for memba@$(node -p "require('./package.json').version")."
          fi
        env:
          SENTRY_TOKEN_SET: ${{ secrets.SENTRY_AUTH_TOKEN != '' && 'yes' || '' }}

      - name: Deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
