name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  ci-frontend:
    name: Frontend CI Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [ci-frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GNO_CHAIN_ID: test12
          VITE_GNO_RPC_URL: https://rpc.testnet12.samourai.live:443
          VITE_DAO_REALM_PATH: gno.land/r/samcrew/samourai_dao
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_GNOLOVE_API_URL: https://backend.gnolove.world
          VITE_GNO_MONITORING_API_URL: https://monitoring.gnolove.world
          # Sentry release + source-map upload (Phase 0a CR2-07 fix)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Verify source maps were actually uploaded — guards against silent
      # SM-upload failure (R-09 in v7.1 plan).
      - name: Verify Sentry source maps uploaded
        run: |
          set -euo pipefail
          MAP_COUNT=$(find dist/assets -name '*.js.map' | wc -l | tr -d ' ')
          echo "Generated $MAP_COUNT source map files in build."
          if [ "$MAP_COUNT" -eq 0 ]; then
            echo "::error::No source maps generated — Sentry upload would be empty."
            exit 1
          fi

      - name: Deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
