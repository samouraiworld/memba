name: EVM Contracts

# Why this workflow exists.
#
# Until now no workflow referenced contracts/evm at all, so `forge` never ran in
# CI. For 21 commits the quality gates existed only as prose in a session handoff
# table, self-reported by the agent being gated — and one of them (`tsc --noEmit`)
# was a no-op that could not fail. A gate that cannot fail is worse than no gate:
# it manufactures confidence and licenses skipping review.
#
# Everything here runs on the runner, so a claim in a PR description is never
# evidence. The check run is.

on:
  pull_request:
    branches: [main, dev/v2, dev/evm-migration]
    paths:
      - 'contracts/evm/**'
      - '.github/workflows/evm.yml'
  push:
    branches: [main, dev/v2, dev/evm-migration]
    paths:
      - 'contracts/evm/**'
      - '.github/workflows/evm.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: contracts/evm

jobs:
  build-test:
    name: Build · Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --force

      - name: Format check
        run: forge fmt --check

      - name: Test
        run: forge test -vv

      # `forge coverage` cannot run without --ir-minimum on this codebase:
      # Deploy.s.sol already trips stack-too-deep with the optimizer disabled.
      - name: Coverage
        run: forge coverage --ir-minimum --no-match-coverage "script" --report lcov --report summary | tee coverage.txt

      # Ratchet, not a target — these may only ever be raised.
      #
      # Measured 2026-07-24 after the Collections suite: 80.66% line / 53.20% branch
      # / 72.97% func. Branch started at 39.91% before the escrow money-path work.
      # Floors sit a point under the measurement so ordinary noise does not red the
      # build, while still locking in the gain. Tier targets (T1 funds-at-risk
      # contracts to >=90% branch) are tracked in docs/evm-migration/BACKLOG.md
      # section D; raising these floors is what closes it.
      - name: Coverage ratchet
        run: |
          set -euo pipefail
          LINE=$(grep -E '^\| Total' coverage.txt | awk -F'|' '{print $3}' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          BRANCH=$(grep -E '^\| Total' coverage.txt | awk -F'|' '{print $5}' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          FUNC=$(grep -E '^\| Total' coverage.txt | awk -F'|' '{print $6}' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "line=${LINE}% branch=${BRANCH}% func=${FUNC}%"
          fail=0
          awk -v v="$LINE"   'BEGIN{exit !(v+0 < 79)}' && { echo "::error::line coverage ${LINE}% < 79% floor"; fail=1; }
          awk -v v="$BRANCH" 'BEGIN{exit !(v+0 < 52)}' && { echo "::error::branch coverage ${BRANCH}% < 52% floor"; fail=1; }
          awk -v v="$FUNC"   'BEGIN{exit !(v+0 < 71)}' && { echo "::error::function coverage ${FUNC}% < 71% floor"; fail=1; }
          exit $fail

      # Generated-artifact freshness. The checked-in TypeScript ABIs drifted silently
      # once already — 13 of 15 went stale after a round of contract changes, so the
      # frontend was encoding calls against a shape that no longer existed and nothing
      # failed, because nothing compared them. Mirrors the repo's existing
      # verify-worker.cjs determinism gate.
      - name: "Determinism gate: frontend ABIs match the contracts"
        working-directory: .
        run: |
          set -euo pipefail
          sudo apt-get install -y jq >/dev/null 2>&1 || true
          ./contracts/evm/script/gen-abis.sh
          if ! git diff --exit-code -- frontend/src/lib/chain/evm/abi/; then
            echo "::error::Frontend ABIs are stale. Run ./contracts/evm/script/gen-abis.sh and commit the result."
            exit 1
          fi
          echo "✅ frontend ABIs match the compiled contracts"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-coverage
          path: contracts/evm/lcov.info
          if-no-files-found: ignore

  # Negative controls. A gate never observed failing is not a gate — these assert
  # that the storage-slot gate and the compiler actually reject bad input, so a
  # silently-broken check cannot sit green for another 21 commits.
  canary:
    name: Gate canaries (must fail on bad input)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Storage-slot gate rejects a fabricated constant
        run: |
          set -euo pipefail
          CORRECT=0x06c2baaba768e2c688920095b37ec66d19b5cffc74cdb69dc62cd18fcd71bd00
          FABRICATED=0xb4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f2a1b0c9d8e7f6a50000
          sed -i "s/${CORRECT}/${FABRICATED}/" src/commerce/MembaEscrow.sol
          if forge test --match-test test_AllStorageSlotsMatchTheirDerivation >/dev/null 2>&1; then
            echo "::error::storage-slot gate PASSED on a fabricated constant — the gate is broken"
            exit 1
          fi
          echo "✅ storage-slot gate correctly rejects a fabricated constant"
          git checkout -- src/commerce/MembaEscrow.sol

      - name: Compiler gate rejects a deliberate error
        run: |
          set -euo pipefail
          printf '\ncontract _CanaryShouldNotCompile { uint256 x = "not a number"; }\n' >> src/lib/MembaUpgradeAuthority.sol
          if forge build --force >/dev/null 2>&1; then
            echo "::error::forge build PASSED on invalid Solidity — the gate is broken"
            exit 1
          fi
          echo "✅ compiler gate correctly rejects invalid Solidity"
          git checkout -- src/lib/MembaUpgradeAuthority.sol

  slither:
    name: Slither (static analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Uploading SARIF to code scanning needs security-events: write. Declared
    # explicitly so a later tightening of the repo's default token scope can't
    # quietly break the upload.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # Slither compiles through crytic-compile -> `forge build`, and forge
      # auto-fetches solc 0.8.28 per foundry.toml. So the ONLY toolchain slither
      # needs is this stable forge. We deliberately do NOT use crytic/slither-action:
      # it re-runs `foundryup` internally and pulls an UNPINNED NIGHTLY forge on
      # every run, whose download is transient-flaky (a corrupt tarball once made
      # the action exit non-zero, which the old gate misreported as "HIGH findings"
      # when Slither had actually found 0 High — see G-7 in docs/evm-migration/BACKLOG).
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Pinned on purpose. A floating slither can add/re-classify detectors and
      # red a green branch with no code change — the same moving-external-dependency
      # failure class this whole change removes. Bump deliberately.
      - name: Install Slither
        run: pip install slither-analyzer==0.11.5

      # slither.config.json's filter_paths are REPO-ROOT-relative
      # (contracts/evm/lib/|contracts/evm/test/), so slither MUST run from the repo
      # root with target contracts/evm or the filter silently no-ops. The
      # workflow-level `defaults.run.working-directory: contracts/evm` would break
      # that, so both run-steps below pin working-directory back to the workspace root.
      #
      # --fail-none makes the EXIT CODE mean "did the analysis run", never "found
      # something": findings are read from results.json in the gate. That split is
      # the point — "couldn't run" and "found a HIGH" become two distinct signals.
      - name: Run Slither
        id: slither
        working-directory: ${{ github.workspace }}
        # Pass trusted context through env (not inlined into the shell body) so this
        # run-step contains no `${{ }}` interpolation — the safe convention even for
        # trusted values like the repo slug and SHA.
        env:
          MARKDOWN_ROOT: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
        run: |
          set -uo pipefail
          slither contracts/evm \
            --config-file contracts/evm/slither.config.json \
            --sarif results.sarif \
            --json results.json \
            --fail-none \
            --checklist \
            --markdown-root "$MARKDOWN_ROOT"
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "Slither process exit code: ${code}"
          exit 0

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: slither

      - name: "Gate: fail only on real HIGH findings"
        working-directory: ${{ github.workspace }}
        env:
          SLITHER_EXIT: ${{ steps.slither.outputs.exit_code }}
        run: |
          set -euo pipefail
          code="$SLITHER_EXIT"

          # Distinguish "Slither couldn't run" from "Slither found something".
          if [ ! -f results.json ]; then
            echo "::error::Slither did not produce results.json (process exit ${code}). This is a TOOL/RUN failure (compilation or environment), NOT a findings failure — read the 'Run Slither' log."
            exit 1
          fi
          if [ "$(jq -r '.success' results.json)" != "true" ]; then
            echo "::error::Slither did not complete its analysis: $(jq -r '.error // "unknown error"' results.json). TOOL/RUN failure, NOT a findings failure."
            exit 1
          fi

          # lib/ and test/ are already excluded by filter_paths.
          high=$(jq '[.results.detectors[]? | select(.impact == "High")] | length' results.json)
          echo "Slither completed. HIGH-severity findings: ${high}"

          if [ "${high}" -gt 0 ]; then
            echo "::error::Slither reported ${high} HIGH-severity finding(s). See the Security tab (code scanning) and the 'Run Slither' checklist."
            jq -r '.results.detectors[]? | select(.impact == "High") | "  - [\(.check)] \(.description | gsub("\n"; " "))"' results.json || true
            exit 1
          fi
          echo "Slither: analysis completed with 0 HIGH-severity findings."
