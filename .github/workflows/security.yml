name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  security-events: write

jobs:
  frontend-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: npm audit (production)
        run: cd frontend && npm audit --production --audit-level=high

  # backend-audit removed (v7.1 plan §4.2 a.2): govulncheck is run by
  # ci.yml on every PR and govulncheck.yml on cron. Running here on a third
  # schedule (with a stale Go pin) produced inconsistent signal.

  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Install @cyclonedx/cyclonedx-npm
        run: npm install -g @cyclonedx/cyclonedx-npm
      - name: Generate SBOM
        run: cd frontend && cyclonedx-npm --output-file ../sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
