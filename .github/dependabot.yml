version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    # Re-enabled 2026-06-28 (Wave 0 audit). v7.1 program freeze is over.
    # Major updates ignored (semver-major); grouped by ecosystem for manageable PRs.
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      remotion:
        patterns:
          - "remotion"
          - "@remotion/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      sentry:
        patterns:
          - "@sentry/*"
      clerk:
        patterns:
          - "@clerk/*"
      connectrpc:
        patterns:
          - "@connectrpc/*"
      bufbuild:
        patterns:
          - "@bufbuild/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      dev-deps:
        dependency-type: "development"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      cosmos:
        patterns:
          - "github.com/cosmos/*"
          - "cosmossdk.io/*"
      connectrpc:
        patterns:
          - "connectrpc.com/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
