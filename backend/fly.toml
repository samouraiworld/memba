# fly.toml app configuration file generated for memba-backend on 2026-02-24T14:11:04+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'memba-backend'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

# Rolling deploy: required because this app has a persistent volume
# ([[mounts]] memba_data) AND runs on a single machine — bluegreen is
# incompatible with both constraints. Accept ~30s of restart downtime
# per deploy; rollback via `flyctl releases rollback` or GHCR image
# mirror (see docs/OPS_RUNBOOK.md §rollback).
[deploy]
  strategy = "rolling"
  wait_timeout = "5m"

[env]
  CORS_ORIGINS = 'https://memba.samourai.app,http://localhost:5173'
  DB_PATH = '/data/memba.db'
  GNO_CHAIN_ID = 'test-13'
  # Token chain-id allowlist (validation). HARD CUTOVER to test13: test12 dropped.
  # This 401s any lingering test12 client — intended (test12 is retired). If a
  # brief overlap is wanted, temporarily set 'test-13,test12' then drop test12.
  MEMBA_ACCEPTED_CHAIN_IDS = 'test-13'
  GNO_RPC_URL = 'https://rpc.testnet13.samourai.live:443'
  # NFT indexer RPC — pinned to samourai's own node (default is the public
  # rpc.test13.testnets.gno.land). The fast catch-up after the tailer block-hash
  # fixes (#457/#462) tripped that public node's per-IP rate limit (403 on the Fly
  # egress IP; 200 elsewhere); our own node doesn't throttle us.
  NFT_RPC_URL = 'https://rpc.testnet13.samourai.live:443'
  # AUTH ENFORCEMENT — fail-closed by default since Wave 1 (2026-06-28).
  # MEMBA_ALLOW_UNSIGNED_AUTH no longer needed (default rejects unsigned auth).
  # Set to '1' ONLY in dev/staging if you need unsigned auth for testing.
  # A3 multisig sig-verify enforcement is HELD: no multisig_sig_verify{result=ok}
  # has been observed, so flipping it blind could reject a legit multisig tx if A3
  # sign-byte reconstruction diverges (as the login doc did). Validate A3 against a
  # real member signature first, THEN add:
  #   MEMBA_ENFORCE_MULTISIG_SIG_VERIFY = '1'
  PORT = '8080'

[[mounts]]
  source = 'memba_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
