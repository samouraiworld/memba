# fly.toml app configuration file generated for memba-backend on 2026-02-24T14:11:04+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'memba-backend'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

# Rolling deploy: required because this app has a persistent volume
# ([[mounts]] memba_data) AND runs on a single machine — bluegreen is
# incompatible with both constraints. Accept ~30s of restart downtime
# per deploy; rollback via `flyctl releases rollback` or GHCR image
# mirror (see docs/OPS_RUNBOOK.md §rollback).
[deploy]
  strategy = "rolling"
  wait_timeout = "5m"

[env]
  BACKUP_INTERVAL = '24h'
  CORS_ORIGINS = 'https://memba.samourai.app,http://localhost:5173'
  DB_PATH = '/data/memba.db'
  GNO_CHAIN_ID = 'test12'
  # Token chain-id allowlist (validation). Additive: accept BOTH chains during
  # the test12->test13 transition so a user on test13 isn't 401'd while test12 is
  # still the default. New tokens are still stamped per the client's chain. At
  # the hard cutover, set GNO_CHAIN_ID='test-13' and drop test12 from this list.
  MEMBA_ACCEPTED_CHAIN_IDS = 'test12,test-13'
  GNO_RPC_URL = 'https://rpc.testnet12.samourai.live:443'
  PORT = '8080'

[[mounts]]
  source = 'memba_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
