[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://memba-backend.fly.dev https://*.gno.land https://*.testnets.gno.land https://gnolove.world https://api.github.com https://memba-multisig.netlify.app https://deploy-preview-*--memba-multisig.netlify.app; img-src 'self' data: https://avatars.githubusercontent.com https://pbs.twimg.com https://gnolove.world; frame-src 'self' https://app.netlify.com;"
