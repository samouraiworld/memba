[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Clerk satellite proxy — allows memba.samourai.app to use the shared
# Samourai App Clerk instance without a dedicated clerk.memba CNAME.
# Must be BEFORE the SPA catch-all or it will never match.
[[redirects]]
  from = "/__clerk/*"
  to = "https://frontend-api.clerk.services/*"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# D1 (AAA-0): Immutable cache for content-hashed Vite assets.
# Filenames like /assets/index-racrH-hq.js are content-hashed — safe to cache
# permanently. index.html stays at must-revalidate (always checks for new builds).
# Without this, all assets serve max-age=0,must-revalidate (Netlify default) and
# every mobile revisit revalidates every chunk over a flaky 4G connection.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  NODE_VERSION = "22"

# CSP Dual-Config (v2.9):
# This is the PRODUCTION CSP enforced by Netlify edge headers.
# The LOCAL/DEV CSP is in frontend/index.html <meta http-equiv="Content-Security-Policy">.
# ⚠️ KEEP BOTH IN SYNC — any connect-src or frame-src change must be applied to BOTH files.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(self \"https://meet.jit.si\" \"https://8x8.vc\"), microphone=(self \"https://meet.jit.si\" \"https://8x8.vc\"), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://clerk.samourai.app https://plausible.io blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://memba-backend.fly.dev https://*.gno.land https://*.testnets.gno.land https://*.samourai.live https://rpc.gnoland1.moul.p2p.team https://rpc.gnoland1.aeddi.org https://*.sentry.io https://monitoring.gnolove.world https://gnolove.world https://backend.gnolove.world https://api.github.com https://gateway.lighthouse.storage wss://*.gno.land https://*.gnoland.network wss://*.gnoland.network https://*.onbloc.xyz wss://*.onbloc.xyz https://clerk.samourai.app https://accounts.samourai.app https://plausible.io; img-src 'self' data: https: ipfs:; media-src 'self' data: blob:; object-src 'none'; base-uri 'self'; frame-src https://meet.jit.si https://8x8.vc https://accounts.samourai.app;"
