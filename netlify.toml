[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Clerk satellite proxy — allows memba.samourai.app to use the shared
# Samourai App Clerk instance without a dedicated clerk.memba CNAME.
# Must be BEFORE the SPA catch-all or it will never match.
[[redirects]]
  from = "/__clerk/*"
  to = "https://frontend-api.clerk.services/*"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# D1 (AAA-0): Immutable cache for content-hashed Vite assets.
# Filenames like /assets/index-racrH-hq.js are content-hashed — safe to cache
# permanently. index.html stays at must-revalidate (always checks for new builds).
# Without this, all assets serve max-age=0,must-revalidate (Netlify default) and
# every mobile revisit revalidates every chunk over a flaky 4G connection.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  NODE_VERSION = "22"
  # Pin the network key so the Netlify build can't pick up a stale dashboard
  # VITE_GNO_CHAIN_ID. A retired "test12" there made DEFAULT_NETWORK invalid and
  # infinite-looped the /:network redirects (/test12/test12/… → replaceState crash,
  # hit on mobile / private browsing). lib/config.ts also validates this against
  # NETWORKS as a code-level safety net.
  # ⚠️ Topaz cutover (Phase B): merging this flips the PROD landing network to
  # topaz-1. It is a COORDINATED change — the backend Fly env (MEMBA_ACCEPTED_CHAIN_IDS,
  # GNO_CHAIN_ID, the RPC URLs, homeSnapshotRPCURL) and the mandatory indexer reset
  # MUST land in the same window, or auth/feed/home break. See the Topaz cutover plan.
  VITE_GNO_CHAIN_ID = "topaz"

# CSP Dual-Config (v2.9):
# This is the PRODUCTION CSP enforced by Netlify edge headers.
# The LOCAL/DEV CSP is in frontend/index.html <meta http-equiv="Content-Security-Policy">.
# ⚠️ KEEP connect-src / frame-src / style-src IN SYNC across BOTH files.
# script-src INTENTIONALLY DIVERGES (SEC-3): prod drops 'unsafe-inline' and instead
# allowlists the one inline script — the Plausible init stub in index.html — by its
# sha256 hash. Dev keeps 'unsafe-inline' because Vite's HMR injects unhashed inline
# scripts. If you edit that stub, recompute the hash: it is the sha256 of the exact
# <script> body. (A hash + 'unsafe-inline' together makes browsers ignore the latter.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(self \"https://meet.jit.si\" \"https://8x8.vc\"), microphone=(self \"https://meet.jit.si\" \"https://8x8.vc\"), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-XVj80uUSzt3JWa6FTzTaafmEiRYXOb5edzL/N5F/s6U=' 'wasm-unsafe-eval' https://clerk.samourai.app https://plausible.io blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://memba-backend.fly.dev https://*.gno.land https://*.testnets.gno.land https://*.samourai.live https://rpc.gnoland1.moul.p2p.team https://rpc.gnoland1.aeddi.org https://*.sentry.io https://monitoring.gnolove.world https://gnolove.world https://backend.gnolove.world https://api.github.com https://gateway.lighthouse.storage wss://*.gno.land https://*.gnoland.network wss://*.gnoland.network https://*.onbloc.xyz wss://*.onbloc.xyz https://clerk.samourai.app https://accounts.samourai.app https://plausible.io; img-src 'self' data: https: ipfs:; media-src 'self' data: blob:; object-src 'none'; base-uri 'self'; frame-src https://meet.jit.si https://8x8.vc https://accounts.samourai.app;"
