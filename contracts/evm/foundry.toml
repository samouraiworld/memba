[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
gas_reports = ["*"]

# Arbitrum Nitro supports 96KB contracts (4x Ethereum's 24KB)
# but we target 24KB for cross-chain compatibility
# contract_size_limit = 24576  # default

[profile.default.fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "attributes_first"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[profile.ci]
verbosity = 2
fuzz = { runs = 1000 }

[rpc_endpoints]
robinhood_mainnet = "${ROBINHOOD_MAINNET_RPC_URL}"
robinhood_testnet = "${ROBINHOOD_TESTNET_RPC_URL}"

[etherscan]
robinhood_mainnet = { key = "${BLOCKSCOUT_API_KEY}", url = "https://robinhoodchain.blockscout.com/api" }
robinhood_testnet = { key = "${BLOCKSCOUT_API_KEY}", url = "https://explorer.testnet.chain.robinhood.com/api" }
